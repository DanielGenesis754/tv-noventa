<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Noventa</title>
    <link rel="stylesheet" href="estilo.css?v=clear-programas-1">
    <link rel="icon" href="logoicon.png" type="image/png">

</head>
<body>
    <main>
        <section id="programas" class="programasc">
            <div class="checkbox-container">
                <label><input type="checkbox" id="programasCheckbox" checked> Propagandas</label>
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="entrevistasCheckbox" checked> Entrevistas</label>
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="humorCheckbox" checked> Humor</label>
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="desenhosCheckbox" checked> Desenhos/Infantil</label>
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="filmesCheckbox" checked> Filmes</label>
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="intervalosGloboCheckbox" checked> Intervalos Globo</label>
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="jornaisCheckbox" checked> Jornais</label>
            </div>
            <button id="clearProgramas" type="button">Limpar</button>
        </section>
        <!-- Frame de vÃ­deo dentro da imagem da TV -->
        <div id="video-frame-container">
            <img id="tv-image" src="oldtelevision.png" alt="TV Antiga">
            <div class="video-container" id="video-frame"></div>
        </div>
        <div id="backgroundimg">
           <img id="bg-img" src="imagemfundo.png" alt="Imagem fundo 90"> 
        </div>
        <!-- BotÃµes para iniciar e trocar os vÃ­deos -->
        <div id="channelDisplay" aria-live="polite">Carregando canais...</div>
        <button id="togglePlayback">Ligar TV</button>
        <button id="previousVideo" type="button" aria-label="Canal anterior">&lt;</button>
        <button id="nextVideo">></button>
        <button id="volumeDown" class="volume-control" type="button" aria-label="Diminuir volume">-</button>
        <button id="volumeUp" class="volume-control" type="button" aria-label="Aumentar volume">+</button>
        
    </main>
    <script src="estrutura.js?v=clear-programas-1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TV Anos 90</title>

    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <main>

        <section id="programas" class="programasc">

            <div class="checkbox-container">
                <label>
                    <input
                        type="checkbox"
                        id="programasCheckbox"
                        checked>
                    Propagandas
                </label>
            </div>

            <div class="checkbox-container">
                <label>
                    <input
                        type="checkbox"
                        id="desenhosCheckbox"
                        checked>
                    Desenhos
                </label>
            </div>

            <div class="checkbox-container">
                <label>
                    <input
                        type="checkbox"
                        id="filmesCheckbox"
                        checked>
                    Filmes
                </label>
            </div>

        </section>

        <div id="video-frame-container">

            <img
                id="tv-image"
                src="./assets/oldtelevision.png"
                alt="TV Antiga">

            <div
                id="video-frame"
                class="video-container">
            </div>

        </div>

        <div class="controls">

            <button id="togglePlayback">
                Ligar TV
            </button>

            <button id="nextVideo">
                >
            </button>

        </div>

    </main>

    <script src="estrutura.js"></script>

</body>

</html>
